<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SATHAN LINUX | SYSTEM ROOT</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix-bg"></canvas>

    <div class="webos-container">
        <div class="top-bar">
            <div class="left">
                <img src="https://i.ibb.co/FLbGXbDR/1000011961.jpg" alt="LOGO" class="sys-logo">
                <span class="glitch" data-text="SATHAN LINUX">SATHAN LINUX</span>
            </div>
            <div class="right"><span id="sys-clock"></span></div>
        </div>

        <div class="desktop-icons">
            <div class="icon-box" onclick="openTool('term-win')">
                <img src="https://cdn-icons-png.flaticon.com/512/906/906334.png" alt="Terminal">
                <span>Terminal</span>
            </div>
            <div class="icon-box" onclick="openTool('bomb-win')">
                <img src="https://cdn-icons-png.flaticon.com/512/564/564445.png" alt="Bomber">
                <span>OTP Bomber</span>
            </div>
            <div class="icon-box" onclick="openTool('cam-win')">
                <img src="https://cdn-icons-png.flaticon.com/512/4812/4812397.png" alt="Cam">
                <span>Cam Hack</span>
            </div>
            <div class="icon-box" onclick="openTool('loc-win')">
                <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Track">
                <span>IP Tracker</span>
            </div>
            <div class="icon-box" onclick="openTool('db-win')">
                <img src="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" alt="Database">
                <span>DB Leak</span>
            </div>
        </div>

        <div id="window-layer">
            <div class="window" id="term-win" style="display:block;">
                <div class="win-header"><span>kali@sathan: ~</span><span class="close" onclick="closeTool('term-win')">X</span></div>
                <div class="win-body term-body">
                    <p class="red-text">WARNING: SYSTEM BREACH DETECTED...</p>
                    <div id="cmd-history"></div>
                    <div class="input-line"><span>$</span><input type="text" id="user-input" autofocus></div>
                </div>
            </div>

            <div class="window" id="bomb-win">
                <div class="win-header"><span>BOMBER EXPLOIT</span><span class="close" onclick="closeTool('bomb-win')">X</span></div>
                <div class="win-body">
                    <input type="number" id="target" placeholder="Phone Number">
                    <button class="hack-btn" onclick="runBomb()">INJECT PACKETS</button>
                    <div class="log" id="bomb-log"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="error-overlay">SYSTEM COMPROMISED!</div>

    <script src="script.js"></script>
    <script src="tools.js"></script>
</body>
</html>
